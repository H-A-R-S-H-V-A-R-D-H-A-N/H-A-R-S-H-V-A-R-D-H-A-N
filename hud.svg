<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F2937" stroke-width="1" stroke-opacity="0.3"/>
    </pattern>
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotateReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes scan {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(400px); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    @keyframes glitch {
      0%, 100% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    .bg { fill: #0A0E17; }
    .text-title { fill: #00F0FF; font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; letter-spacing: 2px; }
    .text-subtitle { fill: #39FF14; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
    .text-hud { fill: #8B949E; font-family: 'Courier New', monospace; font-size: 12px; }
    
    .ring-1 { transform-origin: center; animation: rotate 20s linear infinite; fill: none; stroke: #00F0FF; stroke-width: 1; stroke-dasharray: 4 8; }
    .ring-2 { transform-origin: center; animation: rotateReverse 15s linear infinite; fill: none; stroke: #39FF14; stroke-width: 2; stroke-dasharray: 20 10 5 10; opacity: 0.7; }
    .ring-3 { transform-origin: center; animation: rotate 30s linear infinite; fill: none; stroke: #00F0FF; stroke-width: 0.5; stroke-dasharray: 2 4; }
    
    .scanner { fill: #00F0FF; opacity: 0.3; animation: scan 4s linear infinite; }
    
    .bar { fill: #39FF14; transform-origin: bottom; animation: pulse 1s infinite alternate; }
    .b1 { animation-delay: 0.1s; }
    .b2 { animation-delay: 0.3s; }
    .b3 { animation-delay: 0.5s; }
    .b4 { animation-delay: 0.2s; }
    .b5 { animation-delay: 0.6s; }

    .glitch-target { animation: glitch 4s infinite step-end; }
  </style>

  <!-- Background -->
  <rect width="800" height="400" rx="10" class="bg" />
  <rect width="800" height="400" rx="10" fill="url(#grid)" />

  <!-- Decorative Borders -->
  <path d="M 20 20 L 60 20 M 20 20 L 20 60" fill="none" stroke="#00F0FF" stroke-width="2" />
  <path d="M 780 20 L 740 20 M 780 20 L 780 60" fill="none" stroke="#00F0FF" stroke-width="2" />
  <path d="M 20 380 L 60 380 M 20 380 L 20 340" fill="none" stroke="#00F0FF" stroke-width="2" />
  <path d="M 780 380 L 740 380 M 780 380 L 780 340" fill="none" stroke="#00F0FF" stroke-width="2" />

  <!-- Animated Rings (Right side) -->
  <g transform="translate(650, 200)">
    <circle r="80" class="ring-1" />
    <circle r="60" class="ring-2" />
    <circle r="100" class="ring-3" />
    <circle r="4" fill="#00F0FF" filter="url(#glow-cyan)" />
    <!-- Crosshair -->
    <path d="M -110 0 L 110 0 M 0 -110 L 0 110" fill="none" stroke="#1F2937" stroke-width="1" />
  </g>

  <!-- Title / Identity -->
  <g transform="translate(50, 160)">
    <text class="text-hud" y="-40">SYS_ID: 0x8F9B</text>
    <text class="text-hud" y="-20">STATUS: ONLINE</text>
    
    <text class="text-title glitch-target" filter="url(#glow-cyan)">HARSHVARDHAN SINGH RATHORE</text>
    
    <rect x="0" y="20" width="400" height="1" fill="#1F2937" />
    
    <text class="text-subtitle" y="50" filter="url(#glow-green)">> BUG BOUNTY HUNTER</text>
    <text class="text-subtitle" y="75" filter="url(#glow-green)">> SECURITY RESEARCHER</text>
    <text class="text-subtitle" y="100" filter="url(#glow-green)">> DEVELOPER</text>
  </g>

  <!-- Audio / Data Bars (Left side) -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="8" height="30" class="bar b1" />
    <rect x="12" y="0" width="8" height="30" class="bar b2" />
    <rect x="24" y="0" width="8" height="30" class="bar b3" />
    <rect x="36" y="0" width="8" height="30" class="bar b4" />
    <rect x="48" y="0" width="8" height="30" class="bar b5" />
    <text x="70" y="25" class="text-hud" style="animation: blink 2s infinite">SYNCING DATA...</text>
  </g>

  <!-- Hex Dump Decoration -->
  <g transform="translate(480, 50)" class="text-hud" opacity="0.6">
    <text y="0">0x00A1  E8 05 00 00 00</text>
    <text y="20">0x00A6  8B 45 FC 83 C0</text>
    <text y="40">0x00AB  01 89 45 FC 83</text>
    <text y="60">0x00B0  7D FC 0A 7E E2</text>
  </g>

  <!-- Scanning Line (Placed last so it overlaps) -->
  <rect width="800" height="2" x="0" y="0" class="scanner" filter="url(#glow-cyan)" />
</svg>
